#############################
# AFKMine 기본 설정
#############################

# 보상 정산 주기 (초)
# - 광산 더미가 채굴한 블록의 드롭을 몇 초마다 한 번씩 플레이어에게 정산할지 여부입니다.
reward-interval: 10

# 한 번의 정산에서 지급할 최대 아이템 수
# - 0 이하 값이면 제한 없이 모두 지급합니다.
reward-max-items-per-tick: 0

#############################
# 이동 감지 / AFK 종료 설정
#############################

# AFK 모드 시작 직후, 이동해도 종료 확인 폼을 띄우지 않는 유예 시간 (초)
movement-grace-seconds: 3.0

# 이동 감지 최소 거리 (블럭 단위)
# - 이 값보다 적게 움직인 경우에는 무시합니다.
movement-min-distance: 0.1

#############################
# 카메라 연출 설정
#############################

# 카메라 포인트와 광부(miner) 사이를 따라갈 때,
# 광부 쪽으로 얼마나 가까워질 수 있는지의 최대 비율 (0.0 ~ 1.0)
camera-offset-max: 0.6

# 각 카메라 포인트에서 머무는 시간 (초)
camera-hold-seconds: 5.0

#############################
# AFK 세션 타임아웃
#############################

# 최대 AFK 지속 시간 (초)
# - 0 이하 값이면 제한 없이 계속 유지됩니다.
max-afk-seconds: 0

